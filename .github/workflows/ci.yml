name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Placeholder values let the build succeed in CI.
          # The real values are injected at runtime by Netlify — never commit them here.
          PUBLIC_FIREBASE_API_KEY: ci-placeholder
          PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          PUBLIC_FIREBASE_APP_ID: "1:0:web:0"
          PUBLIC_FIREBASE_DATABASE_URL: https://ci-placeholder-default-rtdb.firebasedatabase.app
          RAWG_API_KEY: ci-placeholder
